<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>

body{

    margin:0;

    background:#0b1020;

    color:white;

    font-family:Arial;
}

.top{

    padding:30px;

    background:#121a31;

    font-size:30px;

    font-weight:bold;
}

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    padding:30px;
}

.card{

    background:#121a31;

    padding:30px;

    border-radius:20px;
}

</style>

</head>
<body>

<div class="top">
LTD PANEL Dashboard
</div>

<div class="cards">

<div class="card">
<h2>Ticket System</h2>
<p>Manage support tickets</p>
</div>

<div class="card">
<h2>Music System</h2>
<p>Control Discord music</p>
</div>

<div class="card">
<h2>Messages</h2>
<p>Configure welcome messages</p>
</div>

<div class="card">
<h2>Moderation</h2>
<p>Manage server security</p>
</div>

</div>

</body>
</html>
