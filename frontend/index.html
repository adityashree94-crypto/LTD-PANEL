<!DOCTYPE html>
<html>
<head>

<title>LTD PANEL</title>

<style>

body{

    margin:0;

    background:#0b1020;

    color:white;

    font-family:Arial;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.box{

    width:420px;

    padding:40px;

    border-radius:24px;

    background:#121a31;

    text-align:center;
}

input{

    width:100%;

    height:52px;

    margin-top:18px;

    border:none;

    border-radius:14px;

    padding-left:16px;
}

button{

    width:100%;

    height:52px;

    margin-top:18px;

    border:none;

    border-radius:14px;

    background:#3b82ff;

    color:white;

    font-weight:bold;

    cursor:pointer;
}

</style>

</head>
<body>

<div class="box">

<h1>LTD PANEL</h1>

<p>Developed by Aditya Shree</p>

<input
type="text"
placeholder="Enter License Key"
id="license"
/>

<button onclick="activate()">
Activate
</button>

</div>

<script>

function activate(){

    const key=
    document.getElementById("license").value;

    if(
        key==="ADITYASHREELOVESNANCY2026"
    ){

        localStorage.setItem(
            "licensed",
            "true"
        );

        window.location.href=
        "dashboard.html";

    }else{

        alert("Invalid License");

    }

}

</script>

</body>
</html>
